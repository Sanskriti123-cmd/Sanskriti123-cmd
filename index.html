<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Music Player</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <div class="container">
        <div class="row">
            <div class="col-sm-4"></div>
            <div class="col-sm-4">
                <div class="card text-center">
                    <img src="" id="photo" class="card-img-top rounded-circle" alt="...">
                    <audio id="audio"></audio>
                    <div class="card-body">
                        <img src="play.gif"
                            style="height: 60px;width: 100%;margin-left: 0px important;border: 0px important;">
                        <h5 class="card-title" id="title">Demo</h5>
                        <p class="card-text">Demo</p>
                        <a href="#" class="btn btn-primary">Pre</a>
                        <a href="#" class="btn btn-primary" onClick="playpause()">Play/Pause</a>
                        <a href="#" class="btn btn-primary" onClick="next()">Next</a>
                    </div>
                </div>
            </div>
            <div class="col-sm-4"></div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script>
        var songs = ["song1.mp3", "song2.mp3", "song3.mp3"];
        var songsimg = ["Amaal.jpg", "man.jpg","vishal.avif"];
        var songname = ["Oh Khuda", "Pehle bhi mai", "Saiyarra"];
        var player = document.getElementById("audio");
        var title = document.getElementById("title");
        var photo = document.getElementById("photo");

        var index = 0;
        function load() {
            player.src = songs[index];
            photo.src = songsimg[index];
            title.innerText = songname[index];

        }
        load();
        function playpause() {
            if (player.paused) {
                player.play();
            } else {
                player.pause();
            }
        }
        function next(){
            index++;
            if(index>songs.length-1){
                index=0;
            }
            load();
            player.play();
            
        }
    </script>
</body>

</html>
